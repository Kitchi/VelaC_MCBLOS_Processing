[selfcal]
nloops = 2
cell = '2.0arcsec'
robust = -0.5
imsize = [6144, 6144]
wprojplanes = 768
niter = [10000, 50000, 100000]
deconvolver = 'mtmfs'
gridder = 'wproject'
gaintype = 'T'

[imaging]
cell = '1.5arcsec'
robust = -0.5
imsize = [6144, 6144]
wprojplanes = 768
niter = 100000
threshold = '0.04mJy'
stokes = 'IQUV'
