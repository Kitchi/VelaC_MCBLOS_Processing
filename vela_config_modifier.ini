[crosscal]
minbaselines = 4
chanbin = 1
width = 1
timeavg = '8s'
createmms = True
keepmms = True
refant = 'm059'
standard = 'Stevens-Reynolds 2016'

[slurm]
nodes = 2
ntasks_per_node = 8
mem = 232
partition = 'Main'
account = 'b223-vela-mc-blos-ag'
container = '/idia/software/containers/casa-6.5.0-modular.sif'
mpi_wrapper = 'mpirun'
modules = ['openmpi/4.0.3']

[run]
dopol = True

[sbatch_overrides]
partition.time = 06:00:00
partition.mem = 60GB
plotcal_spw.time = 00:10:00
plotcal_spw.mem = 20GB
concat.mem = 120GB
flag_round_1.mem = 64GB
flag_round_1.ntasks_per_node = 4
flag_round_1.time = 2:00:00
flag_round_2.mem = 64GB
flag_round_2.ntasks_per_node = 4
flag_round_2.time = 03:00:00
